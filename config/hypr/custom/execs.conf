# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5

# Waybar when bar.useWaybar is true (after Quickshell starts)
exec-once = sleep 2 && $HOME/.config/hypr/custom/scripts/sync-waybar.sh
# Waybar when bar.useWaybar is true in illogical-impulse config (after Quickshell starts)
exec-once = sleep 2 && $HOME/.config/hypr/custom/scripts/sync-waybar.sh
